<!DOCTYPE html>
<html>
    <head>
        <title>my website</title>
        <style>
            body{
                font-family:Arial;
                margin:0;
            }
            .header{
                background-color:lightblue;
                padding:20px;
                text-align:center;
            }
            .nav{
                background-color:#5f5f5a;
                padding:10px;
                text-align:center;
            }
            .nav a{
                color:white;
                text-decoration:none;
                margin:15px;
                font-size:18px;
                padding:8px 12px;
            }
            nav a:hover{
                background-color:orange;
                color:black;
                border-radius:5px;
            }
            .content{
                padding:30px;
                margin:20px;
                border:2px solid gray;
            }
            .footer{
                background-color:lightgray;
                text-align:center;
                padding:15px;
            }
